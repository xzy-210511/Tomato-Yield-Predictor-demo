spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tomato_yield}
spring.datasource.username=${DB_USERNAME:tomato_app}
spring.datasource.password=${DB_PASSWORD:tomato_app}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
